<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 Math Adventure - Math Quest</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Math Adventure</h1>
            <p class="subtitle" id="subtitleText">Math Quest</p>
        </div>

        <!-- Setup Section -->
        <div id="setupSection" class="section setup-section">
            <div class="setup-box">
                <h2>🚀 Let's Get Started!</h2>

                <div class="name-input-section">
                    <label>Who is playing?</label>
                    <div class="player-options">
                        <button class="player-btn" onclick="selectPlayer('NILAN')">
                            <img src="./Picture/Nilan.jpeg" alt="NILAN" class="player-image">
                            <span class="player-name">NILAN</span>
                        </button>
                        <button class="player-btn" onclick="selectPlayer('MITHULA')">
                            <img src="./Picture/Mithula.jpeg" alt="MITHULA" class="player-image">
                            <span class="player-name">MITHULA</span>
                        </button>
                    </div>
                </div>

                <p class="section-title">Select your operation:</p>

                <div class="operation-options">
                    <button class="operation-btn" onclick="selectOperation('addition')">
                        <span class="operation-icon">➕</span>
                        <span class="operation-label">Addition</span>
                    </button>
                    <button class="operation-btn" onclick="selectOperation('subtraction')">
                        <span class="operation-icon">➖</span>
                        <span class="operation-label">Subtraction</span>
                    </button>
                </div>

                <p class="section-title" id="difficultyLabel" style="display:none;">Select how many digits you want for
                    the problems:</p>

                <div class="digit-options" id="digitOptions" style="display:none;">
                    <button class="digit-btn" onclick="setupGame(1)">
                        <span class="digit-icon">1️⃣</span>
                        <span class="digit-label">1 Digit</span>
                    </button>
                    <button class="digit-btn" onclick="setupGame(2)">
                        <span class="digit-icon">2️⃣</span>
                        <span class="digit-label">2 Digits</span>
                    </button>
                    <button class="digit-btn" onclick="setupGame(3)">
                        <span class="digit-icon">3️⃣</span>
                        <span class="digit-label">3 Digits</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Game Section -->
        <div id="gameSection" class="section game-section hidden">
            <div class="game-header">
                <div class="score-box">
                    <span class="score-label">Problems Solved:</span>
                    <span id="scoreValue" class="score-value">0</span>
                </div>
                <button class="reset-btn" onclick="resetGame()">🔄 New Game</button>
            </div>

            <div class="problem-box">
                <div class="problem-display">
                    <span id="num1" class="number">0</span>
                    <span class="operator">+</span>
                    <span id="num2" class="number">0</span>
                    <span class="equals">=</span>
                    <span class="question-mark">?</span>
                </div>
                <div class="speech-controls">
                    <button class="speak-btn" onclick="speakProblem()" title="Read problem aloud">
                        <span class="speak-icon">🔊</span>
                        <span class="speak-text">Read Aloud</span>
                    </button>
                    <div class="volume-control">
                        <label for="volumeSlider">Volume:</label>
                        <input type="range" id="volumeSlider" min="0" max="100" value="100" class="volume-slider">
                    </div>
                </div>

                <!-- Visual Representation Toggle & Adjustment -->
                <div class="visual-rep-controls">
                    <div class="toggle-container">
                        <label class="toggle-label">
                            <input type="checkbox" id="visualToggle" class="toggle-checkbox"
                                onchange="toggleVisualRepresentation()" checked>
                            <span class="toggle-switch"></span>
                            <span class="toggle-text">Show Counting Lines</span>
                        </label>
                    </div>
                    <div class="line-size-control">
                        <label for="lineSizeSlider">Line Size:</label>
                        <input type="range" id="lineSizeSlider" min="20" max="80" value="40" class="line-size-slider"
                            onchange="updateVisualRepresentation()">
                    </div>
                </div>

                <!-- Visual Representation Tile -->
                <div id="visualTile" class="visual-tile hidden">
                    <div class="lines-container">
                        <div id="linesDisplay" class="lines-display"></div>
                    </div>
                </div>
            </div>

            <div class="input-section">
                <input type="number" id="answerInput" class="answer-input" placeholder="Enter your answer"
                    onkeypress="handleKeyPress(event)" autocomplete="off">
                <button class="submit-btn" onclick="checkAnswer()">✔️ Check</button>
            </div>

            <div id="feedback" class="feedback hidden"></div>
        </div>
    </div>

    <!-- Confetti Animation -->
    <div id="confetti-container" class="confetti-container"></div>

    <!-- Celebration Modal -->
    <div id="celebrationModal" class="celebration-modal hidden">
        <div class="celebration-content">
            <img id="celebrationPlayerImage" src="" alt="Player" class="modal-player-image">
            <div class="celebration-emoji">🎉</div>
            <h2>Fantastic Work!</h2>
            <div class="celebration-stars">
                <span class="star">⭐</span>
                <span class="star">⭐</span>
                <span class="star">⭐</span>
                <span class="star">⭐</span>
                <span class="star">⭐</span>
            </div>
            <p class="celebration-message">You got it right!</p>
            <button class="next-btn" onclick="generateProblem()">Next Problem →</button>
        </div>
    </div>

    <!-- Incorrect Answer Modal -->
    <div id="incorrectModal" class="incorrect-modal hidden">
        <div class="incorrect-content">
            <img id="incorrectPlayerImage" src="" alt="Player" class="modal-player-image">
            <div class="incorrect-emoji">😢</div>
            <h2>Oops!</h2>
            <p class="incorrect-message">Not quite right, <span id="incorrectUserName"></span>!</p>
            <p class="try-again-text">Give it another try!</p>
            <div class="incorrect-buttons">
                <button class="retry-btn" onclick="retryProblem()">Try Again</button>
                <button class="show-answer-btn" onclick="showCorrectAnswer()">Show Answer</button>
            </div>
            <p id="correctAnswerDisplay" class="correct-answer-text hidden"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
